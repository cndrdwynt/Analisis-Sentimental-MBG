version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mbg_database
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mbg_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
    depends_on:
      - mongodb

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: mbg_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=mongodb
      - DB_MONGODB_CONNECTION_URL=mongodb://mongodb:27017/n8n
    depends_on:
      - mongodb
    volumes:
      - n8n_data:/home/node/.n8n

  metabase:
    image: metabase/metabase:latest
    container_name: mbg_metabase
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - mongodb

volumes:
  mongo_data:
  n8n_data:
  metabase_data: