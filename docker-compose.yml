version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mbg_database
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=passwordkuat123
    volumes:
      - ./db_mongo:/data/db

  mongo-express:
    image: mongo-express
    container_name: mbg_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:passwordkuat123@mongodb:27017/
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=passwordkuat123
    depends_on:
      - mongodb

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: mbg_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - ./data_n8n:/home/node/.n8n
    depends_on:
      - mongodb

  metabase:
    image: metabase/metabase:latest
    container_name: mbg_metabase
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - ./data_metabase:/metabase-data
    depends_on:
      - mongodb